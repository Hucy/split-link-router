<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        font-family: system-ui, sans-serif;
        width: 260px;
        margin: 0;
        padding: 14px 16px;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 6px;
      }
      p {
        margin: 0 0 10px;
        color: #555;
        font-size: 12px;
        line-height: 1.5;
      }
      button {
        width: 100%;
        padding: 8px;
        border: 1px solid #d0d0d0;
        background: #fff;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
      }
      button:hover {
        background: #f4f4f4;
      }
    </style>
  </head>
  <body>
    <h1>Split Link Router</h1>
    <p>首次使用：右键 tab → <b>Open in split view</b> 组成分屏，然后外链点击会路由到副屏。</p>
    <button id="openOptions">打开设置</button>
    <script src="popup.js"></script>
  </body>
</html>
